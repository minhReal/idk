<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VietChat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 14px; background: #1e1f22; color: #dcddde; height: 100vh; overflow: hidden; }

  /* AUTH */
  #auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #1e1f22; z-index: 10; }
  #auth-box { background: #2b2d31; border: 1px solid #1a1b1e; border-radius: 8px; padding: 32px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  #auth-box h2 { text-align: center; margin-bottom: 6px; font-size: 22px; color: #fff; }
  #auth-box p { text-align: center; color: #949ba4; font-size: 13px; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; margin-bottom: 5px; color: #b5bac1; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .field input { width: 100%; padding: 9px 11px; background: #1e1f22; border: 1px solid #111214; border-radius: 4px; font-size: 14px; color: #dcddde; outline: none; }
  .field input:focus { border-color: #5865f2; }
  .field input::placeholder { color: #4e5058; }
  .btn { width: 100%; padding: 10px; background: #5865f2; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 4px; }
  .btn:hover { background: #4752c4; }
  .btn:disabled { background: #3c3f45; color: #6d6f78; cursor: not-allowed; }
  .err { color: #f38ba8; font-size: 13px; margin-bottom: 12px; text-align: center; background: rgba(243,139,168,.1); padding: 8px; border-radius: 4px; }
  #auth-toggle { text-align: center; margin-top: 14px; font-size: 13px; color: #949ba4; }
  #auth-toggle span { color: #00a8fc; cursor: pointer; }
  #auth-toggle span:hover { text-decoration: underline; }

  /* APP */
  #app { display: none; width: 100vw; height: 100vh; flex-direction: row; }

  /* Sidebar */
  #sidebar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; }
  #server-name { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; font-size: 15px; color: #fff; border-bottom: 1px solid #1e1f22; box-shadow: 0 1px 0 rgba(0,0,0,.3); }
  #channel-list { padding: 8px 8px 0; }
  .ch-label { font-size: 11px; font-weight: bold; color: #949ba4; padding: 16px 8px 4px; text-transform: uppercase; letter-spacing: .8px; }
  .ch-item { padding: 6px 10px; border-radius: 4px; cursor: pointer; color: #949ba4; display: flex; align-items: center; gap: 6px; font-size: 15px; user-select: none; }
  .ch-item:hover { background: rgba(255,255,255,.07); color: #dcddde; }
  .ch-item.active { background: rgba(255,255,255,.1); color: #fff; }
  .ch-hash { font-size: 18px; font-weight: bold; color: #6d6f78; line-height: 1; }
  .ch-item.active .ch-hash { color: #dcddde; }

  #member-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  #member-list::-webkit-scrollbar { width: 4px; }
  #member-list::-webkit-scrollbar-thumb { background: #1e1f22; border-radius: 4px; }
  .mem-label { font-size: 11px; font-weight: bold; color: #949ba4; padding: 16px 8px 4px; text-transform: uppercase; letter-spacing: .8px; }
  .mem-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 4px; }
  .mem-item:hover { background: rgba(255,255,255,.06); }
  .mem-item.offline { opacity: .4; }
  .mem-name { font-size: 14px; color: #949ba4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mem-item:hover .mem-name { color: #dcddde; }
  .mem-name.is-me { color: #fff; font-weight: bold; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sdot.on { background: #23a559; }
  .sdot.off { background: #4e5058; }

  /* User bar */
  #user-bar { height: 52px; background: #232428; border-top: 1px solid #1e1f22; display: flex; align-items: center; gap: 6px; padding: 0 8px; flex-shrink: 0; }
  #ubar-info { flex: 1; min-width: 0; }
  #ubar-name { font-size: 13px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #ubar-sub { font-size: 11px; color: #4e5058; }
  .ibtn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 4px; font-size: 17px; color: #b5bac1; position: relative; line-height: 1; }
  .ibtn:hover { background: rgba(255,255,255,.1); color: #dcddde; }
  .badge { position: absolute; top: 1px; right: 1px; background: #ed4245; color: #fff; font-size: 9px; font-weight: bold; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; pointer-events: none; }

  /* Chat area */
  #chat-area { flex: 1; display: flex; flex-direction: column; background: #313338; min-width: 0; }
  #chat-header { height: 48px; padding: 0 16px; border-bottom: 1px solid #1e1f22; display: flex; align-items: center; gap: 8px; flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,0,0,.3); }
  #hdr-hash { font-size: 20px; font-weight: bold; color: #6d6f78; line-height: 1; }
  #hdr-name { font-weight: bold; font-size: 15px; color: #fff; }
  #hdr-hint { font-size: 13px; color: #4e5058; margin-left: 10px; }

  #messages { flex: 1; overflow-y: auto; padding: 8px 0; }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: #2f3136; }
  #messages::-webkit-scrollbar-thumb { background: #202225; border-radius: 6px; }

  .date-div { display: flex; align-items: center; gap: 10px; padding: 16px 16px 4px; }
  .date-div::before, .date-div::after { content:''; flex:1; height:1px; background:#3f4147; }
  .date-div span { font-size: 12px; color: #949ba4; font-weight: bold; white-space: nowrap; }

  .msg-row { padding: 2px 16px; display: flex; gap: 14px; align-items: flex-start; }
  .msg-row:hover { background: rgba(0,0,0,.06); }
  .msg-row.newgroup { padding-top: 16px; }
  .ava { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: #4e5058; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #fff; overflow: hidden; }
  .ava img { width: 100%; height: 100%; object-fit: cover; }
  .ava-gap { width: 36px; flex-shrink: 0; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .msg-author { font-weight: bold; font-size: 14px; color: #fff; }
  .msg-author.me { color: #5865f2; }
  .msg-time { font-size: 11px; color: #4e5058; }
  .msg-text { font-size: 14px; color: #dcddde; line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
  .ping { background: rgba(88,101,242,.25); color: #c9cdfb; padding: 0 3px; border-radius: 3px; font-weight: bold; }
  .ping.mine { background: rgba(250,166,26,.2); color: #faa61a; }

  /* Input */
  #input-area { padding: 0 16px 20px; flex-shrink: 0; }
  #men-dd { background: #2b2d31; border: 1px solid #1e1f22; border-radius: 6px; box-shadow: 0 -8px 20px rgba(0,0,0,.4); overflow: hidden; margin-bottom: 6px; display: none; }
  .men-opt { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: pointer; }
  .men-opt:hover { background: rgba(255,255,255,.06); }
  .men-opt .ava { width: 24px; height: 24px; font-size: 10px; }
  .men-opt .mn { font-size: 13px; color: #dcddde; }
  .men-opt .mn b { color: #5865f2; font-weight: normal; }
  .input-wrap { display: flex; align-items: flex-end; background: #383a40; border-radius: 8px; overflow: hidden; }
  #msg-input { flex: 1; background: transparent; border: none; outline: none; padding: 11px 14px; font-size: 14px; color: #dcddde; resize: none; min-height: 44px; max-height: 120px; line-height: 1.5; font-family: Arial, sans-serif; }
  #msg-input::placeholder { color: #4e5058; }
  #send-btn { background: none; border: none; padding: 0 14px 10px 8px; cursor: pointer; color: #b5bac1; font-size: 22px; align-self: flex-end; transition: color .15s; }
  #send-btn:hover { color: #fff; }
  #send-btn:disabled { color: #4e5058; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: #4e5058; margin-top: 5px; padding-left: 2px; }

  /* Notif panel */
  #notif-panel { position: fixed; bottom: 58px; left: 192px; width: 310px; background: #2b2d31; border: 1px solid #1e1f22; border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,.6); z-index: 100; display: none; overflow: hidden; }
  #notif-panel h4 { padding: 12px 14px; border-bottom: 1px solid #1e1f22; font-size: 12px; color: #949ba4; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .ni { padding: 10px 14px; border-bottom: 1px solid #232428; cursor: pointer; border-left: 3px solid transparent; }
  .ni:hover { background: rgba(255,255,255,.04); }
  .ni.unread { border-left-color: #5865f2; background: rgba(88,101,242,.06); }
  .ni-from { font-weight: bold; font-size: 13px; color: #fff; }
  .ni-text { font-size: 13px; color: #949ba4; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ni-meta { font-size: 11px; color: #5865f2; margin-top: 3px; }
  .ni-empty { padding: 28px; text-align: center; color: #4e5058; font-size: 13px; }

  /* Profile modal */
  #prof-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; align-items: center; justify-content: center; }
  #prof-box { background: #2b2d31; border-radius: 8px; width: 380px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .mhdr { background: #232428; padding: 16px 20px; }
  .mhdr h3 { font-size: 16px; color: #fff; }
  .mbody { padding: 20px; }
  .ava-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
  #big-ava { width: 80px; height: 80px; font-size: 30px; cursor: pointer; }
  .ava-actions { display: flex; gap: 8px; }
  .ava-actions button { font-size: 12px; background: #4e5058; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; color: #dcddde; }
  .ava-actions button:hover { background: #6d6f78; }
  .ava-actions .del { background: rgba(237,66,69,.2); color: #ed4245; }
  .ava-actions .del:hover { background: rgba(237,66,69,.35); }
  .mfield { margin-bottom: 16px; }
  .mfield label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: bold; color: #b5bac1; text-transform: uppercase; letter-spacing: .5px; }
  .mfield input, .mfield textarea { width: 100%; padding: 9px 11px; background: #1e1f22; border: 1px solid #111214; border-radius: 4px; font-size: 14px; color: #dcddde; outline: none; font-family: Arial, sans-serif; }
  .mfield input:focus, .mfield textarea:focus { border-color: #5865f2; }
  .mfield input:disabled { color: #4e5058; cursor: not-allowed; }
  .mfield textarea { resize: vertical; min-height: 72px; }
  .mftr { background: #232428; padding: 14px 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .mftr button { padding: 9px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; border: none; font-weight: bold; }
  .ccl { background: transparent; color: #949ba4; }
  .ccl:hover { text-decoration: underline; color: #dcddde; }
  .sav { background: #5865f2; color: #fff; }
  .sav:hover { background: #4752c4; }

  /* Toast */
  #toasts { position: fixed; top: 14px; right: 14px; display: flex; flex-direction: column; gap: 8px; z-index: 999; pointer-events: none; }
  .toast { background: #111214; color: #dcddde; padding: 10px 16px; border-radius: 6px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,.6); border-left: 3px solid #5865f2; animation: tin .25s ease; max-width: 280px; }
  .toast.ping { border-left-color: #faa61a; }
  @keyframes tin { from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div id="auth-box">
    <h2>💬 VietChat</h2>
    <p id="auth-sub">Sign in to continue</p>
    <div id="auth-err" class="err" style="display:none"></div>
    <div class="field">
      <label>Username</label>
      <input id="inp-user" maxlength="20" placeholder="letters, numbers, _ only" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="inp-pass" type="password" placeholder="At least 4 characters">
    </div>
    <div class="field" id="field-confirm" style="display:none">
      <label>Confirm Password</label>
      <input id="inp-confirm" type="password">
    </div>
    <button class="btn" id="auth-btn">Log In</button>
    <div id="auth-toggle">Don't have an account? <span id="auth-switch">Sign up</span></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="server-name">💬 VietChat</div>
    <div id="channel-list">
      <div class="ch-label">Text Channels</div>
      <div class="ch-item active" data-ch="general"><span class="ch-hash">#</span>general</div>
      <div class="ch-item" data-ch="random"><span class="ch-hash">#</span>random</div>
      <div class="ch-item" data-ch="off-topic"><span class="ch-hash">#</span>off-topic</div>
    </div>
    <div id="member-list"></div>
    <div id="user-bar">
      <div class="ava" id="my-ava" style="cursor:pointer" title="Edit profile"></div>
      <div id="ubar-info">
        <div id="ubar-name"></div>
        <div id="ubar-sub">Online</div>
      </div>
      <button class="ibtn" id="notif-btn" title="Notifications">🔔<span class="badge" id="notif-badge" style="display:none">0</span></button>
      <button class="ibtn" id="prof-btn" title="Edit Profile">⚙️</button>
      <button class="ibtn" id="logout-btn" title="Log out">🚪</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="chat-header">
      <span id="hdr-hash" class="ch-hash">#</span>
      <span id="hdr-name">general</span>
      <span id="hdr-hint">Type @username to ping someone</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <div id="men-dd"></div>
      <div class="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="Message #general"></textarea>
        <button id="send-btn" title="Send (Enter)">➤</button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </div>
</div>

<!-- Notif panel -->
<div id="notif-panel">
  <h4>Notifications</h4>
  <div id="notif-list"></div>
</div>

<!-- Profile modal -->
<div id="prof-modal">
  <div id="prof-box">
    <div class="mhdr"><h3>Edit Profile</h3></div>
    <div class="mbody">
      <div class="ava-section">
        <div class="ava" id="big-ava" title="Click to change avatar"></div>
        <div class="ava-actions">
          <button id="pick-ava">📁 Choose Image</button>
          <button class="del" id="del-ava" style="display:none">✕ Remove</button>
        </div>
        <input id="ava-file" type="file" accept="image/*" style="display:none">
      </div>
      <div class="mfield"><label>Username</label><input id="prof-uname" disabled></div>
      <div class="mfield"><label>Bio</label><textarea id="prof-bio" maxlength="120" placeholder="Say something about yourself..."></textarea></div>
    </div>
    <div class="mftr">
      <button class="ccl" id="prof-cancel">Cancel</button>
      <button class="sav" id="prof-save">Save Changes</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, onDisconnect, remove }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbaNEvbLPOw2i6PzpzQkVFDvcIMKtOrxE",
  authDomain: "chat-ef2f6.firebaseapp.com",
  databaseURL: "https://chat-ef2f6-default-rtdb.firebaseio.com",
  projectId: "chat-ef2f6",
  storageBucket: "chat-ef2f6.firebasestorage.app",
  messagingSenderId: "504151895904",
  appId: "1:504151895904:web:f04d45afb61b29f3bfb805",
  measurementId: "G-GM9BZBQJ3L"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

// ── State ─────────────────────────────────────────────
let me = null, curCh = "general", allUsers = {}, lastCount = 0, unsubMsgs = null;
let newAvaData = null, removeAvaFlag = false;

const PALETTE = ["#5865f2","#eb459e","#3ba55d","#faa61a","#ed4245","#00b0f4","#9b59b6","#1abc9c"];

// ── Helpers ───────────────────────────────────────────
function avaColor(n) {
  let h = 0; for (const c of n) h = (h * 31 + c.charCodeAt(0)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}
function applyAva(user, el, size) {
  if (size) { el.style.width=size+"px"; el.style.height=size+"px"; el.style.fontSize=(size*.38)+"px"; }
  const u = user || { username:"?" };
  if (u.avatar) {
    el.style.background="#232428";
    el.innerHTML=`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    el.style.background=avaColor(u.username);
    el.innerHTML=u.username[0].toUpperCase();
  }
}
function avaHtml(user, size=36) {
  const u = user||{username:"?"};
  const s=`width:${size}px;height:${size}px;font-size:${size*.38}px`;
  if (u.avatar) return `<div class="ava" style="${s};background:#232428"><img src="${u.avatar}"></div>`;
  return `<div class="ava" style="${s};background:${avaColor(u.username)}">${u.username[0].toUpperCase()}</div>`;
}
function fmtT(ts){ return new Date(ts).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}); }
function fmtD(ts){
  const d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString()) return "Today";
  const y=new Date(n); y.setDate(n.getDate()-1);
  if(d.toDateString()===y.toDateString()) return "Yesterday";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function renderText(txt,myName){
  return esc(txt).replace(/@([a-zA-Z0-9_]+)/g,
    (_,n)=>`<span class="ping${n===myName?" mine":""}">@${n}</span>`);
}
function toast(msg,type=""){
  const el=document.createElement("div");
  el.className="toast "+type; el.textContent=msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>el.remove(),4200);
}
function hashPw(s){
  let h=5381;
  for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i);
  return (h>>>0).toString(16);
}

// ── Auth ──────────────────────────────────────────────
let authMode="login";

function setMode(m){
  authMode=m;
  document.getElementById("auth-btn").textContent   = m==="login"?"Log In":"Sign Up";
  document.getElementById("auth-sub").textContent   = m==="login"?"Sign in to continue":"Create a new account";
  document.getElementById("field-confirm").style.display = m==="register"?"":"none";
  document.getElementById("auth-toggle").innerHTML  = m==="login"
    ? `Don't have an account? <span id="auth-switch">Sign up</span>`
    : `Already have an account? <span id="auth-switch">Log in</span>`;
  document.getElementById("auth-switch").onclick = ()=>setMode(m==="login"?"register":"login");
  document.getElementById("auth-err").style.display="none";
}
document.getElementById("auth-switch").onclick=()=>setMode("register");
document.getElementById("auth-btn").onclick=doAuth;
["inp-user","inp-pass","inp-confirm"].forEach(id=>
  document.getElementById(id).addEventListener("keydown",e=>{ if(e.key==="Enter") doAuth(); }));

async function doAuth(){
  const username=document.getElementById("inp-user").value.trim().replace(/[^a-zA-Z0-9_]/g,"");
  const password=document.getElementById("inp-pass").value;
  const confirm =document.getElementById("inp-confirm").value;
  const errEl   =document.getElementById("auth-err");

  function showErr(msg){
    errEl.textContent=msg; errEl.style.display="";
    document.getElementById("auth-btn").disabled=false;
    document.getElementById("auth-btn").textContent=authMode==="login"?"Log In":"Sign Up";
  }

  if(!username||username.length<3) return showErr("Username must be at least 3 characters");
  if(!password||password.length<4) return showErr("Password must be at least 4 characters");

  document.getElementById("auth-btn").disabled=true;
  document.getElementById("auth-btn").textContent="Loading...";
  errEl.style.display="none";

  try {
    const snap=await get(ref(db,`users/${username}`));
    if(authMode==="register"){
      if(snap.exists()) return showErr("Username already taken");
      if(password!==confirm) return showErr("Passwords do not match");
      const u={ username, password:hashPw(password), avatar:"", bio:"", createdAt:Date.now() };
      await set(ref(db,`users/${username}`),u);
      startApp(u);
    } else {
      if(!snap.exists()) return showErr("Account not found");
      const u=snap.val();
      if(u.password!==hashPw(password)) return showErr("Wrong password");
      startApp(u);
    }
  } catch(e) {
    showErr("Firebase connection error. Check your Realtime Database Rules.");
    console.error(e);
  }
}

// ── Start App ─────────────────────────────────────────
function startApp(user){
  me=user;

  // Hide auth, show app  ← THE FIX: must set display to "flex" not ""
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("app").style.display="flex";

  document.getElementById("ubar-name").textContent=me.username;
  applyAva(me, document.getElementById("my-ava"), 32);

  // Presence
  const presRef=ref(db,`presence/${me.username}`);
  set(presRef,{online:true,ts:Date.now()});
  onDisconnect(presRef).remove();

  // Watch users
  onValue(ref(db,"users"),snap=>{
    allUsers={}; snap.forEach(c=>{ allUsers[c.key]=c.val(); });
    applyAva(allUsers[me.username]||me, document.getElementById("my-ava"), 32);
  });

  // Watch presence → render members
  onValue(ref(db,"presence"),renderMembers);

  // Channel switching
  document.querySelectorAll(".ch-item").forEach(el=>{
    el.onclick=()=>{
      document.querySelectorAll(".ch-item").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");
      curCh=el.dataset.ch;
      document.getElementById("hdr-name").textContent=curCh;
      document.getElementById("msg-input").placeholder=`Message #${curCh}`;
      lastCount=0;
      listenMessages();
    };
  });

  listenMessages();
  listenNotifs();
}

// ── Members sidebar ───────────────────────────────────
function renderMembers(presSnap){
  const onSet=new Set();
  if(presSnap) presSnap.forEach(c=>{ if(c.val()?.online) onSet.add(c.key); });
  const all=Object.keys(allUsers);
  const online =all.filter(n=>onSet.has(n));
  const offline=all.filter(n=>!onSet.has(n));
  let html="";
  if(online.length){
    html+=`<div class="mem-label">Online — ${online.length}</div>`;
    online.forEach(n=>{
      const u=allUsers[n]||{username:n};
      html+=`<div class="mem-item">${avaHtml(u,26)}<div class="sdot on"></div><span class="mem-name${n===me.username?" is-me":""}">${n}${n===me.username?" (you)":""}</span></div>`;
    });
  }
  if(offline.length){
    html+=`<div class="mem-label">Offline — ${offline.length}</div>`;
    offline.forEach(n=>{
      const u=allUsers[n]||{username:n};
      html+=`<div class="mem-item offline">${avaHtml(u,26)}<div class="sdot off"></div><span class="mem-name">${n}</span></div>`;
    });
  }
  document.getElementById("member-list").innerHTML=html;
}

// ── Messages ──────────────────────────────────────────
function listenMessages(){
  if(unsubMsgs) unsubMsgs();
  document.getElementById("messages").innerHTML="";
  unsubMsgs=onValue(ref(db,`messages/${curCh}`),snap=>{
    const msgs=[];
    snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
    renderMessages(msgs);
    // Ping toasts for new messages
    if(msgs.length>lastCount){
      msgs.slice(lastCount).forEach(m=>{
        if(m.userId!==me.username){
          const pings=(m.text.match(/@([a-zA-Z0-9_]+)/g)||[]).map(x=>x.slice(1));
          if(pings.includes(me.username))
            toast(`📣 ${m.userId} mentioned you in #${curCh}`,"ping");
        }
      });
    }
    lastCount=msgs.length;
  });
}

function renderMessages(msgs){
  const el=document.getElementById("messages");
  const atBot=el.scrollHeight-el.scrollTop-el.clientHeight<80;
  el.innerHTML="";
  let prevD=null,prevU=null,prevTs=0;
  msgs.forEach(m=>{
    const ts=m.ts||0, dl=fmtD(ts);
    if(dl!==prevD){
      el.insertAdjacentHTML("beforeend",`<div class="date-div"><span>${dl}</span></div>`);
      prevD=dl; prevU=null;
    }
    const grouped=prevU===m.userId&&ts-prevTs<5*60000;
    const u=allUsers[m.userId]||{username:m.userId};
    const row=document.createElement("div");
    row.className="msg-row"+(grouped?"":" newgroup");
    if(!grouped){
      row.innerHTML=`${avaHtml(u)}<div class="msg-body"><div class="msg-meta"><span class="msg-author${m.userId===me.username?" me":""}">${esc(u.username)}</span><span class="msg-time">${fmtT(ts)}</span></div><div class="msg-text">${renderText(m.text,me.username)}</div></div>`;
    } else {
      row.innerHTML=`<div class="ava-gap"></div><div class="msg-text">${renderText(m.text,me.username)}</div>`;
    }
    el.appendChild(row);
    prevU=m.userId; prevTs=ts;
  });
  if(!msgs.length) el.innerHTML=`<div style="text-align:center;padding:60px 20px;color:#4e5058"><div style="font-size:48px;color:#3f4147;margin-bottom:12px">#</div><div style="font-size:16px;font-weight:bold;color:#b5bac1;margin-bottom:6px">Welcome to #${curCh}!</div><div style="font-size:13px">This is the beginning of the #${curCh} channel. Send the first message!</div></div>`;
  if(atBot) el.scrollTop=el.scrollHeight;
}

// ── Send message ──────────────────────────────────────
async function sendMsg(){
  const inp=document.getElementById("msg-input");
  const text=inp.value.trim();
  if(!text) return;
  inp.value=""; inp.style.height="44px";
  document.getElementById("men-dd").style.display="none";
  await push(ref(db,`messages/${curCh}`),{userId:me.username,text,ts:Date.now()});
  // Notify pinged users
  const pings=[...new Set((text.match(/@([a-zA-Z0-9_]+)/g)||[]).map(x=>x.slice(1)))];
  for(const uname of pings){
    if(uname===me.username||!allUsers[uname]) continue;
    await push(ref(db,`notifs/${uname}`),{from:me.username,text:text.slice(0,80),channel:curCh,ts:Date.now(),read:false});
  }
}
document.getElementById("send-btn").onclick=sendMsg;
document.getElementById("msg-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById("msg-input").addEventListener("input",function(){
  this.style.height="auto"; this.style.height=Math.min(this.scrollHeight,120)+"px";
  doMentionDD(this);
});

// ── Mention autocomplete ──────────────────────────────
function doMentionDD(inp){
  const val=inp.value,cur=inp.selectionStart;
  const m=val.slice(0,cur).match(/@([a-zA-Z0-9_]*)$/);
  const dd=document.getElementById("men-dd");
  if(!m){dd.style.display="none";return;}
  const q=m[1].toLowerCase();
  const hits=Object.keys(allUsers).filter(n=>n.toLowerCase().startsWith(q)&&n!==me.username).slice(0,6);
  if(!hits.length){dd.style.display="none";return;}
  dd.innerHTML=hits.map(n=>`<div class="men-opt" data-u="${n}">${avaHtml(allUsers[n]||{username:n},26)}<span class="mn"><b>@</b>${n}</span></div>`).join("");
  dd.style.display="";
  dd.querySelectorAll(".men-opt").forEach(opt=>opt.addEventListener("mousedown",e=>{
    e.preventDefault();
    const atPos=val.slice(0,cur).lastIndexOf("@");
    inp.value=val.slice(0,atPos)+`@${opt.dataset.u} `+val.slice(cur);
    dd.style.display="none"; inp.focus();
  }));
}

// ── Notifications ─────────────────────────────────────
function listenNotifs(){
  onValue(ref(db,`notifs/${me.username}`),snap=>{
    const list=[]; snap.forEach(c=>list.push({id:c.key,...c.val()}));
    list.sort((a,b)=>b.ts-a.ts);
    const unread=list.filter(n=>!n.read).length;
    const badge=document.getElementById("notif-badge");
    badge.textContent=unread>9?"9+":unread; badge.style.display=unread?"":"none";
    renderNotifs(list);
  });
}
function renderNotifs(list){
  const el=document.getElementById("notif-list");
  if(!list.length){el.innerHTML=`<div class="ni-empty">No notifications yet</div>`;return;}
  el.innerHTML=list.slice(0,30).map(n=>`
    <div class="ni${n.read?"":" unread"}" data-id="${n.id}" data-ch="${n.channel}">
      <div class="ni-from">📣 ${esc(n.from)} mentioned you</div>
      <div class="ni-text">${esc(n.text)}</div>
      <div class="ni-meta">#${n.channel} · ${fmtT(n.ts)}</div>
    </div>`).join("");
  el.querySelectorAll(".ni").forEach(el=>el.onclick=()=>{
    set(ref(db,`notifs/${me.username}/${el.dataset.id}/read`),true);
    const ch=el.dataset.ch;
    document.querySelectorAll(".ch-item").forEach(c=>c.classList.toggle("active",c.dataset.ch===ch));
    curCh=ch; document.getElementById("hdr-name").textContent=ch; lastCount=0; listenMessages();
    document.getElementById("notif-panel").style.display="none";
  });
}
document.getElementById("notif-btn").onclick=()=>{
  const p=document.getElementById("notif-panel");
  const opening=p.style.display==="none"||!p.style.display;
  p.style.display=opening?"":"none";
  if(opening){
    onValue(ref(db,`notifs/${me.username}`),snap=>{
      snap.forEach(c=>{if(!c.val().read) set(ref(db,`notifs/${me.username}/${c.key}/read`),true);});
    },{onlyOnce:true});
  }
};

// ── Profile ───────────────────────────────────────────
function openProfile(){
  const u=allUsers[me.username]||me;
  applyAva(u, document.getElementById("big-ava"), 80);
  document.getElementById("prof-uname").value=me.username;
  document.getElementById("prof-bio").value=u.bio||"";
  document.getElementById("del-ava").style.display=u.avatar?"":"none";
  newAvaData=null; removeAvaFlag=false;
  document.getElementById("prof-modal").style.display="flex";
}
document.getElementById("prof-btn").onclick=openProfile;
document.getElementById("my-ava").onclick=openProfile;
document.getElementById("big-ava").onclick=()=>document.getElementById("ava-file").click();
document.getElementById("pick-ava").onclick=()=>document.getElementById("ava-file").click();
document.getElementById("ava-file").addEventListener("change",function(){
  const f=this.files[0]; if(!f) return;
  if(f.size>2*1024*1024){alert("Image must be under 2MB");return;}
  const rd=new FileReader(); rd.onload=e=>{
    newAvaData=e.target.result; removeAvaFlag=false;
    const el=document.getElementById("big-ava");
    el.innerHTML=`<img src="${newAvaData}" style="width:100%;height:100%;object-fit:cover">`; el.style.background="#232428";
    document.getElementById("del-ava").style.display="";
  }; rd.readAsDataURL(f);
});
document.getElementById("del-ava").onclick=()=>{
  newAvaData=null; removeAvaFlag=true;
  applyAva({...(allUsers[me.username]||me),avatar:""}, document.getElementById("big-ava"), 80);
  document.getElementById("del-ava").style.display="none";
};
document.getElementById("prof-cancel").onclick=()=>document.getElementById("prof-modal").style.display="none";
document.getElementById("prof-save").onclick=async()=>{
  const bio=document.getElementById("prof-bio").value.trim();
  const curAva=(allUsers[me.username]||me).avatar||"";
  const avatar=removeAvaFlag?"":(newAvaData||curAva);
  await set(ref(db,`users/${me.username}/avatar`),avatar);
  await set(ref(db,`users/${me.username}/bio`),bio);
  me.avatar=avatar; me.bio=bio;
  applyAva(allUsers[me.username]||me, document.getElementById("my-ava"), 32);
  document.getElementById("prof-modal").style.display="none";
  toast("✓ Profile saved");
};

// ── Logout ────────────────────────────────────────────
document.getElementById("logout-btn").onclick=async()=>{
  await remove(ref(db,`presence/${me.username}`));
  location.reload();
};

// ── Click outside to close panels ────────────────────
document.addEventListener("click",e=>{
  if(!e.target.closest("#notif-btn")&&!e.target.closest("#notif-panel"))
    document.getElementById("notif-panel").style.display="none";
  if(!e.target.closest("#msg-input")&&!e.target.closest("#men-dd"))
    document.getElementById("men-dd").style.display="none";
  if(e.target===document.getElementById("prof-modal"))
    document.getElementById("prof-modal").style.display="none";
});
</script>
</body>
